<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neural Digit Recognizer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080c14;
    --panel:     #0d1526;
    --border:    #1a2a4a;
    --accent:    #00d4ff;
    --accent2:   #7b2fff;
    --green:     #00ff88;
    --red:       #ff3366;
    --text:      #c8d8f0;
    --dim:       #4a5a7a;
    --glow:      0 0 20px rgba(0,212,255,0.4);
    --glow2:     0 0 30px rgba(123,47,255,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1000px;
    padding: 30px 20px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }

  .logo-line .bar {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    white-space: nowrap;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    font-size: 11px;
    color: var(--dim);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* Canvas container */
  .canvas-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
  }

  #drawCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 4px;
    cursor: crosshair;
    touch-action: none;
    background: #000;
    border: 1px solid var(--border);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
  }

  /* Brush glow effect on canvas */
  #drawCanvas:active {
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), var(--glow);
  }

  .canvas-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.8;
    z-index: 1;
  }
  .canvas-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .canvas-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .canvas-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .canvas-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  button {
    flex: 1;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 6px;
    border-radius: 3px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-predict {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: var(--glow);
  }

  .btn-predict:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 30px rgba(0,212,255,0.6);
  }

  .btn-predict:active {
    transform: translateY(0);
  }

  .btn-clear {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }

  .btn-clear:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* Right panel - results */
  .result-digit {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 110px;
    margin-bottom: 20px;
    position: relative;
  }

  .digit-display {
    font-family: 'Orbitron', monospace;
    font-size: 90px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center;
  }

  .digit-display.pop {
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .digit-placeholder {
    font-size: 80px;
    color: var(--border);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    line-height: 1;
  }

  /* Confidence */
  .conf-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .conf-bar-wrap {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .conf-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    box-shadow: 0 0 12px rgba(0,212,255,0.6);
    transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    border-radius: 2px;
  }

  .conf-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
    margin-bottom: 20px;
    min-height: 28px;
    text-shadow: var(--glow);
  }

  /* Bar chart for all digits */
  .chart-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    height: 80px;
    gap: 4px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar-fill {
    width: 100%;
    background: var(--border);
    border-radius: 2px 2px 0 0;
    transition: height 0.5s cubic-bezier(0.23, 1, 0.32, 1), background 0.3s;
    min-height: 2px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill.active {
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(0,212,255,0.5);
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.3);
  }

  .bar-label {
    font-size: 9px;
    color: var(--dim);
    font-family: 'Orbitron', monospace;
    transition: color 0.3s;
  }

  .bar-label.active {
    color: var(--accent);
  }

  /* Top 3 */
  .top3 {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .top3-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.3s;
  }

  .top3-item.show {
    opacity: 1;
    transform: translateX(0);
  }

  .top3-rank {
    font-size: 9px;
    color: var(--dim);
    width: 16px;
  }

  .top3-digit {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    width: 20px;
  }

  .top3-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .top3-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.1s;
  }

  .top3-fill.r1 { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .top3-fill.r2 { background: var(--accent2); }
  .top3-fill.r3 { background: var(--dim); }

  .top3-pct {
    font-size: 11px;
    color: var(--dim);
    width: 48px;
    text-align: right;
  }

  /* Loading animation */
  .thinking {
    display: none;
    text-align: center;
    padding: 20px 0;
  }

  .thinking.active {
    display: block;
  }

  .think-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .think-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: thinking 1.2s ease-in-out infinite;
  }

  .think-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .think-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes thinking {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px currentColor; }
  }

  /* Hint text */
  .hint {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-align: center;
    margin-top: 12px;
    text-transform: uppercase;
  }

  /* Corner decorations on main panel */
  .tag {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 9px;
    color: var(--border);
    letter-spacing: 2px;
  }

  /* Flash scan on predict */
  @keyframes scanFlash {
    0% { background-position: -100% 0; }
    100% { background-position: 200% 0; }
  }

  .scanning::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.15) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: scanFlash 0.5s linear;
    pointer-events: none;
    z-index: 10;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 10px;
    color: var(--border);
    letter-spacing: 3px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-line">
      <div class="bar"></div>
      <h1>NEURAL DIGIT</h1>
      <div class="bar"></div>
    </div>
    <div class="subtitle">Deep Learning · MNIST · Real-time Inference</div>
    <div class="status-bar">
      <div class="dot"></div>
      <span id="statusText">MODEL ONLINE · READY</span>
    </div>
  </header>

  <div class="main-grid">
    <!-- Drawing Panel -->
    <div class="panel">
      <div class="panel-title">▶ INPUT CANVAS</div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="drawCanvas"></canvas>
        <div class="canvas-corner tl"></div>
        <div class="canvas-corner tr"></div>
        <div class="canvas-corner bl"></div>
        <div class="canvas-corner br"></div>
      </div>
      <div class="btn-row">
        <button class="btn-predict" id="predictBtn" onclick="predict()">⬡ ANALYZE</button>
        <button class="btn-clear" onclick="clearCanvas()">✕ CLEAR</button>
      </div>
      <div class="hint">Draw a digit (0–9) · Mouse or Touch</div>
      <span class="tag">MNIST · 784-DIM</span>
    </div>

    <!-- Results Panel -->
    <div class="panel" id="resultPanel">
      <div class="panel-title">▶ PREDICTION OUTPUT</div>

      <div class="result-digit">
        <div class="digit-display" id="digitDisplay" style="display:none"></div>
        <div class="digit-placeholder" id="digitPlaceholder">?</div>
      </div>

      <div class="thinking" id="thinking">
        <div class="think-dots">
          <div class="think-dot"></div>
          <div class="think-dot"></div>
          <div class="think-dot"></div>
        </div>
      </div>

      <div class="conf-label">CONFIDENCE</div>
      <div class="conf-bar-wrap"><div class="conf-bar" id="confBar"></div></div>
      <div class="conf-value" id="confValue">—</div>

      <div class="chart-title">PROBABILITY DISTRIBUTION</div>
      <div class="bar-chart" id="barChart"></div>

      <div class="top3" id="top3Container">
        <div class="chart-title">TOP CANDIDATES</div>
        <div id="top3List"></div>
      </div>

      <span class="tag">SOFTMAX · 10-CLASS</span>
    </div>
  </div>
  <footer>FEEDFORWARD NEURAL NETWORK · TENSORFLOW · KERAS</footer>
</div>

<script>
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let lastX = 0, lastY = 0;
let hasDrawing = false;

// Init canvas
function initCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const size = wrap.offsetWidth;
  canvas.width = size;
  canvas.height = size;
  clearCanvas(true);
}

function clearCanvas(silent = false) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hasDrawing = false;
  if (!silent) {
    resetResults();
  }
}

function resetResults() {
  document.getElementById('digitDisplay').style.display = 'none';
  document.getElementById('digitPlaceholder').style.display = 'block';
  document.getElementById('confBar').style.width = '0%';
  document.getElementById('confValue').textContent = '—';
  document.getElementById('thinking').classList.remove('active');

  // Reset bar chart
  const fills = document.querySelectorAll('.bar-fill');
  fills.forEach(f => {
    f.style.height = '2px';
    f.classList.remove('active');
  });
  document.querySelectorAll('.bar-label').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.top3-item').forEach(el => {
    el.classList.remove('show');
  });
}

// Drawing
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  hasDrawing = true;
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  draw(e);
});

canvas.addEventListener('mouseup', () => { drawing = false; });
canvas.addEventListener('mouseleave', () => { drawing = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  hasDrawing = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  draw(e);
}, { passive: false });

canvas.addEventListener('touchend', () => { drawing = false; });

function draw(e) {
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = canvas.width * 0.055;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = canvas.width * 0.03;
  ctx.stroke();
  lastX = p.x; lastY = p.y;
}

// Init bar chart
function initBarChart() {
  const chart = document.getElementById('barChart');
  chart.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.innerHTML = `
      <div class="bar-fill" id="bar-${i}" style="height:2px"></div>
      <div class="bar-label" id="lbl-${i}">${i}</div>
    `;
    chart.appendChild(col);
  }
}

// Predict
async function predict() {
  if (!hasDrawing) return;

  // Scan flash
  const panel = document.getElementById('resultPanel');
  panel.classList.add('scanning');
  setTimeout(() => panel.classList.remove('scanning'), 500);

  // Show thinking
  document.getElementById('digitDisplay').style.display = 'none';
  document.getElementById('digitPlaceholder').style.display = 'none';
  document.getElementById('thinking').classList.add('active');
  document.getElementById('confValue').textContent = '...';
  document.getElementById('statusText').textContent = 'PROCESSING NEURAL INFERENCE...';

  // Get 28x28 image data
  const offscreen = document.createElement('canvas');
  offscreen.width = 28;
  offscreen.height = 28;
  const offCtx = offscreen.getContext('2d');
  offCtx.drawImage(canvas, 0, 0, 28, 28);
  const imgData = offCtx.getImageData(0, 0, 28, 28);

  // Extract grayscale (R channel since we draw white on black)
  const pixels = [];
  for (let i = 0; i < imgData.data.length; i += 4) {
    pixels.push(imgData.data[i] / 255.0);
  }

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: pixels })
    });

    const data = await res.json();

    document.getElementById('thinking').classList.remove('active');

    if (data.error) {
      alert('Error: ' + data.error);
      document.getElementById('statusText').textContent = 'MODEL ONLINE · READY';
      return;
    }

    showResults(data);
    document.getElementById('statusText').textContent = `PREDICTION COMPLETE · DIGIT: ${data.digit}`;

  } catch (err) {
    document.getElementById('thinking').classList.remove('active');
    alert('Connection error. Is Flask running?');
    document.getElementById('statusText').textContent = 'CONNECTION ERROR';
  }
}

function showResults(data) {
  // Digit
  const disp = document.getElementById('digitDisplay');
  const placeholder = document.getElementById('digitPlaceholder');
  disp.textContent = data.digit;
  placeholder.style.display = 'none';
  disp.style.display = 'block';
  disp.classList.remove('pop');
  void disp.offsetWidth; // force reflow
  disp.classList.add('pop');

  // Confidence bar
  document.getElementById('confBar').style.width = data.confidence + '%';
  document.getElementById('confValue').textContent = data.confidence.toFixed(1) + '%';

  // Bar chart
  const probs = data.probabilities;
  const maxProb = Math.max(...probs);
  probs.forEach((p, i) => {
    const bar = document.getElementById('bar-' + i);
    const lbl = document.getElementById('lbl-' + i);
    const h = Math.max(2, (p / 100) * 76);
    bar.style.height = h + 'px';
    bar.classList.toggle('active', i === data.digit);
    lbl.classList.toggle('active', i === data.digit);
  });

  // Top 3
  const list = document.getElementById('top3List');
  list.innerHTML = '';
  const ranks = ['r1', 'r2', 'r3'];
  const rankIcons = ['01', '02', '03'];
  data.top3.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'top3-item';
    el.innerHTML = `
      <span class="top3-rank">${rankIcons[i]}</span>
      <span class="top3-digit">${item.digit}</span>
      <div class="top3-bar">
        <div class="top3-fill ${ranks[i]}" style="width:0%" data-w="${item.confidence}"></div>
      </div>
      <span class="top3-pct">${item.confidence.toFixed(1)}%</span>
    `;
    list.appendChild(el);
    // Animate in with delay
    setTimeout(() => {
      el.classList.add('show');
      el.querySelector('.top3-fill').style.width = item.confidence + '%';
    }, i * 100 + 50);
  });
}

// Init
window.addEventListener('load', () => {
  initCanvas();
  initBarChart();
});

window.addEventListener('resize', () => {
  initCanvas();
  initBarChart();
});
</script>
</body>
</html>
